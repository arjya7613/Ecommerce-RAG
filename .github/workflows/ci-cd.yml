name: RAG CI/CD Pipeline

on:

  push:

    branches: [ "main" ]

  pull_request:

    branches: [ "main" ]
 
jobs:

  build:

    runs-on: ubuntu-24.04
 
    steps:

    - name: Checkout repo

      uses: actions/checkout@v3
 
    - name: Set up Python

      uses: actions/setup-python@v4

      with:

        python-version: "3.10"
 
    - name: Install dependencies

      run: |

        pip install -r requirements.txt
 
    - name: Run tests

      run: |

        echo "No tests yet, add pytest later"


    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo docker system prune -af

 
    - name: Build Docker image

      run: |

        docker build -t ecommerce-rag .
 
    - name: Push to DockerHub

      uses: docker/login-action@v2

      with:

        username: ${{ secrets.DOCKER_USERNAME }}

        password: ${{ secrets.DOCKER_PASSWORD }}

    - run: |

        docker tag medical-rag ${{ secrets.DOCKER_USERNAME }}/medical-rag:latest

        docker push ${{ secrets.DOCKER_USERNAME }}/medical-rag:latest
 
